services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agrocrm
      POSTGRES_USER: agrocrm
      POSTGRES_PASSWORD: agrocrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrocrm -d agrocrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://agrocrm:agrocrm@db:5432/agrocrm?sslmode=disable
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: 8080
      APPLICATIONS_EMAIL: ${APPLICATIONS_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
